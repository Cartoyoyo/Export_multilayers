name: Release to QGIS Plugin Repository

# Triggered when a version tag is pushed (e.g. v1.3.1)
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install qgis-plugin-ci
        run: pip install qgis-plugin-ci

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      # Build the ZIP with qgis-plugin-ci (handles metadata version patching)
      - name: Package plugin
        run: qgis-plugin-ci package ${{ steps.version.outputs.VERSION }}

      # Find the generated ZIP
      - name: Locate ZIP
        id: zip
        run: |
          ZIP=$(ls Export_multilayers*.zip 2>/dev/null | head -1)
          echo "Found: $ZIP"
          echo "ZIP_PATH=$ZIP" >> "$GITHUB_OUTPUT"

      # Create a GitHub Release with the ZIP attached
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.zip.outputs.ZIP_PATH }}
          generate_release_notes: true

      # Upload to plugins.qgis.org via XML-RPC API
      - name: Publish to QGIS Plugin Repository
        if: ${{ vars.PUBLISH_TO_QGIS == 'true' }}
        env:
          OSGEO_USERNAME: ${{ secrets.OSGEO_USERNAME }}
          OSGEO_PASSWORD: ${{ secrets.OSGEO_PASSWORD }}
        run: |
          python3 << 'PYEOF'
          import xmlrpc.client
          import base64
          import os

          zip_path = "${{ steps.zip.outputs.ZIP_PATH }}"
          username = os.environ["OSGEO_USERNAME"]
          password = os.environ["OSGEO_PASSWORD"]

          print(f"Uploading {zip_path} to plugins.qgis.org ...")

          with open(zip_path, "rb") as f:
              zip_data = f.read()

          server = xmlrpc.client.ServerProxy(
              f"https://{username}:{password}@plugins.qgis.org/plugins/RPC2/"
          )
          result = server.plugin.upload(xmlrpc.client.Binary(zip_data))
          print(f"Upload OK: {result}")
          PYEOF
