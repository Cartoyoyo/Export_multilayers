name: Release to QGIS Plugin Repository

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      # Build the ZIP ourselves — plugin files inside Export_multilayers/ folder
      - name: Package plugin
        id: zip
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          ZIP_NAME="Export_multilayers.${VERSION}.zip"
          mkdir -p Export_multilayers
          cp -r __init__.py export_couches.py export_dialog.py metadata.txt \
                icon.png logo.png LICENSE README.md CHANGELOG.md \
                Export_multilayers/
          zip -r "$ZIP_NAME" Export_multilayers/
          echo "ZIP_PATH=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "Created $ZIP_NAME ($(du -h "$ZIP_NAME" | cut -f1))"
          # Verify structure
          echo "--- ZIP contents ---"
          unzip -l "$ZIP_NAME" | head -20

      # Create a GitHub Release with the ZIP attached
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.zip.outputs.ZIP_PATH }}
          generate_release_notes: true

      # Upload to plugins.qgis.org via XML-RPC API
      - name: Publish to QGIS Plugin Repository
        if: ${{ vars.PUBLISH_TO_QGIS == 'true' }}
        env:
          OSGEO_USERNAME: ${{ secrets.OSGEO_USERNAME }}
          OSGEO_PASSWORD: ${{ secrets.OSGEO_PASSWORD }}
          PLUGIN_ZIP: ${{ steps.zip.outputs.ZIP_PATH }}
        run: |
          python3 -c "
          import xmlrpc.client, os

          zip_path = os.environ['PLUGIN_ZIP']
          username = os.environ['OSGEO_USERNAME']
          password = os.environ['OSGEO_PASSWORD']

          print(f'Uploading {zip_path} to plugins.qgis.org ...')

          with open(zip_path, 'rb') as f:
              zip_data = f.read()

          server = xmlrpc.client.ServerProxy(
              f'https://{username}:{password}@plugins.qgis.org/plugins/RPC2/'
          )
          result = server.plugin.upload(xmlrpc.client.Binary(zip_data))
          print(f'Upload OK: {result}')
          "
